name: Build macOS and Upload to R2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.2)'
        required: true
        default: '1.0.2'

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: hiddify-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Download macOS core libs
        run: |
          mkdir -p hiddify-core/bin
          curl -fL https://github.com/hiddify/hiddify-next-core/releases/download/draft/hiddify-lib-macos.tar.gz | tar xz -C hiddify-core/bin/
          ls -lh hiddify-core/bin/

      - name: Install CocoaPods
        run: |
          cd macos
          pod install --repo-update || pod install

      - name: Generate code
        run: |
          make get gen translate || true
          dart run build_runner build --delete-conflicting-outputs || true

      - name: Build macOS
        run: flutter build macos --release

      - name: Ad-hoc code sign
        run: |
          APP_PATH="build/macos/Build/Products/Release/Roxi.app"
          echo "Signing all frameworks and dylibs..."
          find "$APP_PATH" \( -name "*.framework" -o -name "*.dylib" \) | while read f; do
            codesign --force --deep -s - "$f" 2>/dev/null || true
          done
          echo "Signing main app bundle..."
          codesign --force --deep -s - "$APP_PATH"
          echo "Verifying signature..."
          codesign -vvv "$APP_PATH" || true

      - name: Generate DMG background
        run: |
          python3 -c "
          import struct, zlib
          W, H = 540, 300
          bg = (237, 237, 237)
          arrow_color = (160, 160, 165)
          head_color = (140, 140, 148)
          cx, cy = W // 2, 125
          pixels = []
          for y in range(H):
              row = []
              for x in range(W):
                  r, g, b = bg
                  shaft_x1, shaft_x2 = cx - 30, cx + 22
                  if shaft_x1 <= x <= shaft_x2 and cy - 1 <= y <= cy + 1:
                      r, g, b = arrow_color
                  head_base_x = cx + 20
                  head_tip_x = cx + 32
                  if head_base_x <= x <= head_tip_x:
                      progress = (x - head_base_x) / max(1, head_tip_x - head_base_x)
                      half_h = int(7 * (1 - progress))
                      if cy - half_h <= y <= cy + half_h:
                          r, g, b = head_color
                  row.extend([r, g, b])
              pixels.append(bytes([0] + row))
          raw = b''.join(pixels)
          def chunk(ctype, data):
              c = ctype + data
              return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          with open('/tmp/dmg_bg.png', 'wb') as f:
              f.write(b'\x89PNG\r\n\x1a\n')
              f.write(chunk(b'IHDR', struct.pack('>IIBBBBB', W, H, 8, 2, 0, 0, 0)))
              f.write(chunk(b'IDAT', zlib.compress(raw)))
              f.write(chunk(b'IEND', b''))
          print('Background generated: /tmp/dmg_bg.png')
          "

      - name: Create styled DMG
        run: |
          APP_PATH="build/macos/Build/Products/Release/Roxi.app"
          DMG_NAME="Roxi-v${{ github.event.inputs.version }}-macos.dmg"
          STAGING="/tmp/dmg_staging"
          TMP_DMG="/tmp/roxi_tmp.dmg"
          VOL_NAME="Roxi"

          rm -rf "$STAGING"
          mkdir -p "$STAGING/.background"
          cp -R "$APP_PATH" "$STAGING/Roxi.app"
          ln -s /Applications "$STAGING/Applications"
          cp /tmp/dmg_bg.png "$STAGING/.background/bg.png"

          APP_SIZE=$(du -sm "$APP_PATH" | awk '{print $1}')
          DMG_SIZE=$(( APP_SIZE + 80 ))
          echo "App size: ${APP_SIZE}MB, DMG size: ${DMG_SIZE}MB"

          hdiutil create -volname "$VOL_NAME" -srcfolder "$STAGING" -format UDRW -fs HFS+ -size ${DMG_SIZE}m "$TMP_DMG"
          MOUNT_OUT=$(hdiutil attach "$TMP_DMG" -readwrite -noverify -noautoopen)
          MOUNT_DIR=$(echo "$MOUNT_OUT" | grep "Volumes" | awk '{print $3}')
          echo "Mounted at: $MOUNT_DIR"
          sleep 3

          printf '%s\n' 'tell application "Finder"' 'tell disk "Roxi"' 'open' 'delay 1' 'set current view of container window to icon view' 'set toolbar visible of container window to false' 'set statusbar visible of container window to false' 'set the bounds of container window to {200, 200, 740, 500}' 'set viewOptions to the icon view options of container window' 'set arrangement of viewOptions to not arranged' 'set icon size of viewOptions to 96' 'set background picture of viewOptions to file ".background:bg.png"' 'delay 1' 'set position of item "Roxi.app" of container window to {140, 120}' 'set position of item "Applications" of container window to {400, 120}' 'update without registering applications' 'delay 1' 'close' 'end tell' 'end tell' > /tmp/style_dmg.scpt
          osascript /tmp/style_dmg.scpt || echo "AppleScript styling failed (non-fatal)"
          sleep 2

          hdiutil detach "$MOUNT_DIR" -force || hdiutil detach "/Volumes/Roxi" -force || true
          sleep 1
          mkdir -p out
          hdiutil convert "$TMP_DMG" -format UDZO -o "out/$DMG_NAME"
          rm -f "$TMP_DMG"
          rm -rf "$STAGING"
          ls -lh out/

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          R2_EP="https://bd237e8588122632a186921f28ebdfee.r2.cloudflarestorage.com"
          python3 -m pip install awscli --break-system-packages -q
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region auto
          DMG_NAME="Roxi-v${{ github.event.inputs.version }}-macos.dmg"
          aws s3 cp "out/$DMG_NAME" "s3://app-downloads/$DMG_NAME" --endpoint-url "$R2_EP" --content-type "application/x-apple-diskimage"
          aws s3 cp "out/$DMG_NAME" "s3://app-downloads/roxi-latest.dmg" --endpoint-url "$R2_EP" --content-type "application/x-apple-diskimage"
          echo "Done! https://dl.roxi.cc/roxi-latest.dmg"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: macos-build
          path: hiddify-app/out/
          retention-days: 7
