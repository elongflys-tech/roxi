name: Build macOS and Upload to R2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.2)'
        required: true
        default: '1.0.2'

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build-macos:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: hiddify-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Download macOS core libs
        run: |
          mkdir -p hiddify-core/bin
          curl -fL https://github.com/hiddify/hiddify-next-core/releases/download/draft/hiddify-lib-macos.tar.gz | tar xz -C hiddify-core/bin/
          ls -lh hiddify-core/bin/

      - name: Install CocoaPods
        run: |
          cd macos
          pod install --repo-update || pod install

      - name: Generate code
        run: |
          make get gen translate || true
          dart run build_runner build --delete-conflicting-outputs || true

      - name: Build macOS
        run: flutter build macos --release

      - name: Ad-hoc code sign
        run: |
          APP_PATH="build/macos/Build/Products/Release/Roxi.app"
          echo "Signing all frameworks and dylibs..."
          find "$APP_PATH" \( -name "*.framework" -o -name "*.dylib" \) | while read f; do
            codesign --force --deep -s - "$f" 2>/dev/null || true
          done
          echo "Signing main app bundle..."
          codesign --force --deep -s - "$APP_PATH"
          echo "Verifying signature..."
          codesign -vvv "$APP_PATH" || true

      - name: Generate DMG background
        run: |
          python3 -c "
          import struct, zlib
          W, H = 540, 300
          bg = (237, 237, 237)
          arrow_color = (160, 160, 165)
          head_color = (140, 140, 148)
          cx, cy = W // 2, 125
          pixels = []
          for y in range(H):
              row = []
              for x in range(W):
                  r, g, b = bg
                  shaft_x1, shaft_x2 = cx - 30, cx + 22
                  if shaft_x1 <= x <= shaft_x2 and cy - 1 <= y <= cy + 1:
                      r, g, b = arrow_color
                  head_base_x = cx + 20
                  head_tip_x = cx + 32
                  if head_base_x <= x <= head_tip_x:
                      progress = (x - head_base_x) / max(1, head_tip_x - head_base_x)
                      half_h = int(7 * (1 - progress))
                      if cy - half_h <= y <= cy + half_h:
                          r, g, b = head_color
                  row.extend([r, g, b])
              pixels.append(bytes([0] + row))
          raw = b''.join(pixels)
          def chunk(ctype, data):
              c = ctype + data
              return struct.pack('>I', len(data)) + c + struct.pack('>I', zlib.crc32(c) & 0xffffffff)
          with open('/tmp/dmg_bg.png', 'wb') as f:
              f.write(b'\x89PNG\r\n\x1a\n')
              f.write(chunk(b'IHDR', struct.pack('>IIBBBBB', W, H, 8, 2, 0, 0, 0)))
              f.write(chunk(b'IDAT', zlib.compress(raw)))
              f.write(chunk(b'IEND', b''))
          print('Background generated: /tmp/dmg_bg.png')
          "

      - name: Create styled DMG
        run: |
          brew install create-dmg
          APP_PATH="build/macos/Build/Products/Release/Roxi.app"
          DMG_NAME="Roxi-v${{ github.event.inputs.version }}-macos.dmg"

          # create-dmg needs a source folder containing the .app
          STAGING="/tmp/dmg_source"
          rm -rf "$STAGING"
          mkdir -p "$STAGING"
          cp -R "$APP_PATH" "$STAGING/Roxi.app"

          mkdir -p out
          rm -f "out/$DMG_NAME"
          create-dmg \
            --volname "Roxi" \
            --background "/tmp/dmg_bg.png" \
            --window-pos 200 120 \
            --window-size 540 300 \
            --icon-size 96 \
            --icon "Roxi.app" 140 120 \
            --hide-extension "Roxi.app" \
            --app-drop-link 400 120 \
            --no-internet-enable \
            "out/$DMG_NAME" \
            "$STAGING" \
            || true

          if [ -f "out/$DMG_NAME" ]; then
            echo "DMG created successfully"
            ls -lh out/
          else
            echo "create-dmg failed, falling back to basic hdiutil"
            hdiutil create -volname "Roxi" -srcfolder "$STAGING" -format UDZO -fs HFS+ "out/$DMG_NAME"
            ls -lh out/
          fi
          rm -rf "$STAGING"

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          R2_EP="https://bd237e8588122632a186921f28ebdfee.r2.cloudflarestorage.com"
          python3 -m pip install awscli --break-system-packages -q
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region auto
          DMG_NAME="Roxi-v${{ github.event.inputs.version }}-macos.dmg"
          aws s3 cp "out/$DMG_NAME" "s3://app-downloads/$DMG_NAME" --endpoint-url "$R2_EP" --content-type "application/x-apple-diskimage"
          aws s3 cp "out/$DMG_NAME" "s3://app-downloads/roxi-latest.dmg" --endpoint-url "$R2_EP" --content-type "application/x-apple-diskimage"
          echo "Done! https://dl.roxi.cc/roxi-latest.dmg"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: macos-build
          path: hiddify-app/out/
          retention-days: 7
