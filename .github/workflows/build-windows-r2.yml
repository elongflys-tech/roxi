name: Build Windows & Upload to R2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.3.4)'
        required: true
        default: '1.3.4'

env:
  FLUTTER_VERSION: '3.38.5'

jobs:
  build-windows:
    runs-on: windows-latest
    defaults:
      run:
        working-directory: .
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Install deps
        run: |
          dart pub global activate fastforge
          echo "$env:LOCALAPPDATA\Pub\Cache\bin" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Get dependencies
        run: flutter pub get

      - name: Download Windows core libs
        shell: bash
        run: |
          mkdir -p hiddify-core/bin
          curl -L https://github.com/hiddify/hiddify-next-core/releases/download/draft/hiddify-lib-windows-amd64.tar.gz | tar xz -C hiddify-core/bin/
          ls hiddify-core/bin/

      - name: Generate code
        shell: bash
        run: |
          make get gen translate || true
          dart run build_runner build --delete-conflicting-outputs || true

      - name: Build Windows
        run: flutter build windows --release -t lib/main_prod.dart

      # ── Self-signed code signing certificate ──
      - name: Generate self-signed code signing certificate
        shell: pwsh
        run: |
          # Create a self-signed certificate for code signing
          $cert = New-SelfSignedCertificate `
            -Type CodeSigningCert `
            -Subject "CN=Roxi, O=Roxi, C=US" `
            -KeyAlgorithm RSA `
            -KeyLength 2048 `
            -CertStoreLocation "Cert:\CurrentUser\My" `
            -NotAfter (Get-Date).AddYears(5) `
            -FriendlyName "Roxi Code Signing"

          Write-Host "Certificate thumbprint: $($cert.Thumbprint)"
          echo "CERT_THUMBPRINT=$($cert.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append

          # Export as PFX for MSIX signing
          $pfxPassword = ConvertTo-SecureString -String "roxi-build-2026" -Force -AsPlainText
          $pfxPath = "windows\sign.pfx"
          Export-PfxCertificate -Cert $cert -FilePath $pfxPath -Password $pfxPassword | Out-Null
          Write-Host "PFX exported to $pfxPath"

          # Also trust the certificate locally (needed for MSIX)
          Import-PfxCertificate -FilePath $pfxPath -CertStoreLocation "Cert:\LocalMachine\TrustedPeople" -Password $pfxPassword | Out-Null
          Write-Host "Certificate imported to TrustedPeople store"

      # ── Sign all EXE and DLL files ──
      - name: Sign executables
        shell: pwsh
        run: |
          $buildDir = "build\windows\x64\runner\Release"
          if (-not (Test-Path $buildDir)) {
            Write-Error "Build directory not found: $buildDir"
            exit 1
          }

          # Find signtool
          $signtool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits\10\bin" -Recurse -Filter "signtool.exe" |
            Where-Object { $_.FullName -match "x64" } |
            Sort-Object FullName -Descending |
            Select-Object -First 1

          if (-not $signtool) {
            Write-Warning "signtool.exe not found, skipping signing"
            exit 0
          }

          Write-Host "Using signtool: $($signtool.FullName)"
          $thumbprint = $env:CERT_THUMBPRINT

          # Sign all .exe and .dll files
          $files = Get-ChildItem -Path $buildDir -Include "*.exe","*.dll" -Recurse
          foreach ($file in $files) {
            Write-Host "Signing: $($file.Name)"
            & $signtool.FullName sign /sha1 $thumbprint /fd SHA256 /t http://timestamp.digicert.com /v $file.FullName
            if ($LASTEXITCODE -ne 0) {
              Write-Warning "Failed to sign $($file.Name), continuing..."
            }
          }

          Write-Host "=== Signing complete ==="

      # ── Package ZIP (signed) ──
      - name: Package ZIP
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Path "out" -Force | Out-Null
          $buildDir = "build\windows\x64\runner\Release"
          if (Test-Path $buildDir) {
            Write-Host "=== Build output ==="
            Get-ChildItem -Path $buildDir -Depth 1 | Select-Object Name, Length

            # Create a clean Roxi folder, copy everything into it, then zip
            $stageDir = "out\Roxi"
            New-Item -ItemType Directory -Path $stageDir -Force | Out-Null
            Copy-Item -Path "$buildDir\*" -Destination $stageDir -Recurse
            Push-Location out
            7z a -tzip "roxi-win-${{ github.event.inputs.version }}.zip" "Roxi" -r
            Pop-Location
            Copy-Item "out\roxi-win-${{ github.event.inputs.version }}.zip" "out\roxi-latest.zip"
            Remove-Item -Recurse -Force $stageDir

            Get-ChildItem out/
          } else {
            Get-ChildItem -Path "build\windows" -Recurse -Depth 3
            Write-Error "Release build directory not found"
            exit 1
          }

      # ── Build MSIX installer ──
      - name: Build MSIX
        shell: pwsh
        run: |
          # Update MSIX config with current version and certificate
          $version = "${{ github.event.inputs.version }}.0"
          $configPath = "windows\packaging\msix\make_config.yaml"
          $config = Get-Content $configPath -Raw
          $config = $config -replace 'msix_version: .*', "msix_version: $version"
          $config = $config -replace 'certificate_path:.*', "certificate_path: windows\sign.pfx"
          $config = $config -replace 'certificate_password:.*', 'certificate_password: roxi-build-2026'
          Set-Content -Path $configPath -Value $config

          Write-Host "=== MSIX Config ==="
          Get-Content $configPath

          # Install msix_packer and build
          dart pub global activate msix
          dart run msix:create --build-windows false

          # Find and copy the MSIX file
          $msixFile = Get-ChildItem -Path "build" -Filter "*.msix" -Recurse | Select-Object -First 1
          if ($msixFile) {
            Copy-Item $msixFile.FullName "out\roxi-win-${{ github.event.inputs.version }}.msix"
            Copy-Item $msixFile.FullName "out\roxi-latest.msix"
            Write-Host "MSIX created: $($msixFile.Name)"
          } else {
            Write-Warning "MSIX file not found in build output, checking..."
            Get-ChildItem -Path "build" -Recurse -Depth 3 | Where-Object { $_.Extension -match "msix|appx" }
          }

          Write-Host "=== Output files ==="
          Get-ChildItem out/

      - name: Upload to R2
        shell: bash
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          R2_EP="https://bd237e8588122632a186921f28ebdfee.r2.cloudflarestorage.com"
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region auto

          # Upload ZIP
          if [ -f "out/roxi-win-${{ github.event.inputs.version }}.zip" ]; then
            aws s3 cp "out/roxi-win-${{ github.event.inputs.version }}.zip" \
              "s3://app-downloads/roxi-win-${{ github.event.inputs.version }}.zip" \
              --endpoint-url "$R2_EP" --content-type "application/zip"
            aws s3 cp "out/roxi-latest.zip" \
              "s3://app-downloads/roxi-latest.zip" \
              --endpoint-url "$R2_EP" --content-type "application/zip"
            echo "ZIP uploaded: https://dl.roxi.cc/roxi-latest.zip"
          fi

          # Upload MSIX
          if [ -f "out/roxi-win-${{ github.event.inputs.version }}.msix" ]; then
            aws s3 cp "out/roxi-win-${{ github.event.inputs.version }}.msix" \
              "s3://app-downloads/roxi-win-${{ github.event.inputs.version }}.msix" \
              --endpoint-url "$R2_EP" --content-type "application/msix"
            aws s3 cp "out/roxi-latest.msix" \
              "s3://app-downloads/roxi-latest.msix" \
              --endpoint-url "$R2_EP" --content-type "application/msix"
            echo "MSIX uploaded: https://dl.roxi.cc/roxi-latest.msix"
          fi

          echo "Done!"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: windows-build
          path: out/
          retention-days: 7
