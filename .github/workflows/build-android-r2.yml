name: Build Android & Upload to R2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version number (e.g. 1.0.2)'
        required: true
        default: '1.0.2'

env:
  FLUTTER_VERSION: '3.38.5'
  JAVA_VERSION: '17'

jobs:
  build-android:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: hiddify-app
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: ${{ env.JAVA_VERSION }}

      - name: Setup Flutter
        uses: subosito/flutter-action@v2.21.0
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: 'stable'
          cache: true

      - name: Get dependencies
        run: flutter pub get

      - name: Download Android core libs
        run: |
          mkdir -p android/app/libs
          curl -fL https://github.com/hiddify/hiddify-next-core/releases/download/draft/hiddify-lib-android.tar.gz | tar xz -C android/app/libs/
          ls -lh android/app/libs/

      - name: Download hiddify-core bin (for codegen)
        run: |
          mkdir -p hiddify-core/bin
          curl -fL https://github.com/hiddify/hiddify-next-core/releases/download/draft/hiddify-lib-linux-amd64.tar.gz | tar xz -C hiddify-core/bin/
          ls hiddify-core/bin/

      - name: Generate code
        run: |
          make get gen translate || true
          dart run build_runner build --delete-conflicting-outputs || true

      - name: Build APK
        run: |
          flutter build apk --release --split-per-abi --target-platform android-arm64

      - name: Package APK
        run: |
          mkdir -p out
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk out/roxi-arm64-v${{ github.event.inputs.version }}.apk
          ls -lh out/

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          R2_EP="https://bd237e8588122632a186921f28ebdfee.r2.cloudflarestorage.com"
          pip install awscli -q
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region auto

          aws s3 cp "out/roxi-arm64-v${{ github.event.inputs.version }}.apk" \
            "s3://app-downloads/roxi-arm64-v${{ github.event.inputs.version }}.apk" \
            --endpoint-url "$R2_EP" --content-type "application/vnd.android.package-archive"

          aws s3 cp "s3://app-downloads/roxi-arm64-v${{ github.event.inputs.version }}.apk" \
            "s3://app-downloads/roxi-latest.apk" \
            --endpoint-url "$R2_EP"

          echo "Done! https://dl.roxi.cc/roxi-latest.apk"

      - name: Upload Artifact
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: android-build
          path: hiddify-app/out/
          retention-days: 7
