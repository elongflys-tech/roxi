name: Upload Hiddify macOS DMG to R2

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Hiddify version (e.g. v4.1.1)'
        required: true
        default: 'v4.1.1'

jobs:
  upload:
    runs-on: ubuntu-latest
    steps:
      - name: Download from GitHub Releases
        run: |
          curl -fL -o Hiddify-MacOS.dmg \
            "https://github.com/hiddify/hiddify-app/releases/download/${{ github.event.inputs.version }}/Hiddify-MacOS.dmg"
          ls -lh Hiddify-MacOS.dmg

      - name: Upload to R2
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.R2_SECRET_ACCESS_KEY }}
        run: |
          R2_EP="https://bd237e8588122632a186921f28ebdfee.r2.cloudflarestorage.com"
          pip install awscli -q
          aws configure set aws_access_key_id "$AWS_ACCESS_KEY_ID"
          aws configure set aws_secret_access_key "$AWS_SECRET_ACCESS_KEY"
          aws configure set default.region auto
          aws s3 cp Hiddify-MacOS.dmg \
            "s3://app-downloads/Hiddify-MacOS.dmg" \
            --endpoint-url "$R2_EP" --content-type "application/x-apple-diskimage"
          echo "Done! https://dl.roxi.cc/Hiddify-MacOS.dmg"
